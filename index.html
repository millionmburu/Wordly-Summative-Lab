<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>

    <!--CSS-->
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body>

    <!--Header-->
    <header class="text-center p-4 bg-info text-black">
        <h1>Wordly Dictionary 📚</h1>
        <p>All the words you will ever need.</p>
        <button id="toggleTheme" class="btn btn-secondary text-white btn-outline-light btn-sm">Change your theme 🌗</button>
    </header>

    <!--Search-->
    <section class="search container mt-4 mb-2 p-1">
        <form id="searchForm" class="d-flex gap-4">
            <input type="text" id="typeWord" placeholder="Please enter a word..." aria-label="Search Word">
            <button type="submit" class="btn btn-secondary text-white btn-outline-light ">Search</button>
        </form>
    </section>

    <!--loading section-->
    <div id="loading" style="display: none;" class="text-center mt-3 ">
        <div class="spinner-border text-primary"></div>
    </div>

    <!--Results-->
    <section class="results container mt-4">
        <div id="resultsPanel" class="card p-4 shadow border-dark text-bg-secondary">
            <p class="text-black ">Start by looking up a word 🔍</p>
            <div id="audioBox" class="mt-2">
                <p>🔊 Pronunciation</p>
            <audio controls ></audio>
        </div>  
        </div>
    </section>

    <!--favorites-->
    <section class="favorites container mt-4">
        <button id="saveWord" class="btn btn-success mb-3 border-secondary " >Save ⭐</button>
        <div id="favorites"></div>
    </section>

    <!--Javascript-->
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--footer-->
    <footer class="text-center p-3 mt-4 bg-secondary text-white">
        <p>Powered by Free Dictionary API</p>
    </footer>
</body>
</html>
